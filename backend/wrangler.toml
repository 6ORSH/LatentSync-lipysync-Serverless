name = "latentsync-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Only genuinely-public, stable config lives here. Everything account-specific or
# secret (R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, RUNPOD_API_KEY,
# RUNPOD_ENDPOINT_ID, PUBLIC_BASE_URL, JWT_SECRET, WEBHOOK_SECRET) comes from
# `wrangler secret put` in prod and .dev.vars locally. Do NOT add them here as
# empty vars — a plain var overrides a same-named secret on deploy and wipes it.
[vars]
R2_BUCKET = "latentsync-stag"

# R2 bucket binding (server-side reads/listing; presigning uses S3 creds via aws4fetch)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "latentsync-stag"

# Hyperdrive -> Postgres (Neon). For local `wrangler dev`, set the direct Neon
# connection string in your shell as:
#   WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE="postgres://...sslmode=require"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "413667244a1548a79393896f87c961d9"
